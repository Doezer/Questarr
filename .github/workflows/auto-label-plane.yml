name: Auto-label new issues for Plane

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  add-plane-label:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Ensure "plane" label exists and add it to new issue
        uses: actions/github-script@8ade135a41bc03ea155e62e844d188df1ea18608 # v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const labelName = "plane";

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: "1D76DB",
                description: "Issue synced with Plane project tool",
              });
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [labelName],
            });
