coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        # Minimum coverage the project must have
        target: 45%
        # Allow coverage to drop by at most 1% before failing
        threshold: 1%
        base: auto

    patch:
      default:
        # Require new code introduced in a PR to be at least 50% covered
        target: 50%
        threshold: 5%
        base: auto

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "dist/**"
  - "node_modules/**"
  - "tests/e2e/**"
  - "**/*.config.ts"
  - "**/*.config.js"
