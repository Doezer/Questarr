name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Extract changelog section
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          node scripts/extract-changelog.mjs "$VERSION" > changelog-section.md

      - name: Append release footer
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)

          {
            echo ""
            echo "**Download**: set your Docker image tag to ${TAG}"
            echo "- [GitHub Container Registry](https://github.com/${REPO}/pkgs/container/questarr)"
            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
            fi
          } >> changelog-section.md

      - name: Create draft release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: changelog-section.md
          draft: true
