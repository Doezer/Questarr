name: Deploy Web App

on:
  # Allow manual trigger for on-demand deployment
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "test"
        type: choice
        options:
          - production
          - dev
          - test
      tag:
        description: "Docker image tag (leave empty for auto-generated tag)"
        required: false
        default: ""
      build_arm64:
        description: "Build ARM64 image (slows down build)"
        required: false
        default: false
        type: boolean
      comment-id: # ← passed automatically by slash-command-dispatch
        required: false
      repository: # ← also passed automatically
        required: false

  # Run daily at midnight from the default branch (main) for dev builds
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'schedule' && 'dev' || inputs.environment || 'production' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Determine Environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" == "schedule" ]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=${INPUT_ENVIRONMENT:-dev}" >> $GITHUB_ENV
            echo "environment=${INPUT_ENVIRONMENT:-dev}" >> $GITHUB_OUTPUT
          fi

          # Normalize repository name to lowercase and strip owner for Docker Hub
          REPO_NAME="$REPOSITORY"
          # Get the part after the slash (repo name only)
          REPO_SHOULD_BE_NAME="${REPO_NAME##*/}"
          # Lowercase
          REPO_NAME_LC=$(echo "$REPO_SHOULD_BE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "REPO_NAME_LC=$REPO_NAME_LC" >> $GITHUB_ENV

      - name: Set up QEMU
        if: env.ENVIRONMENT == 'production' && inputs.build_arm64 == true
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            doezer/${{ env.REPO_NAME_LC }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest,enable=${{ env.ENVIRONMENT == 'production' }}
            type=raw,value=dev,enable=${{ env.ENVIRONMENT == 'dev' }}
            type=sha,prefix=${{ env.ENVIRONMENT }}-sha-,format=short,enable=${{ env.ENVIRONMENT != 'dev' }}
          labels: |
            org.opencontainers.image.title=Questarr
            org.opencontainers.image.description=A video game management application inspired by the -Arr apps. Track and organize your video game collection with automated discovery and download management.
            org.opencontainers.image.vendor=Doezer

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ (env.ENVIRONMENT == 'production' && inputs.build_arm64 == true) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Deployment summary
        id: summary
        run: |
          TAG="latest"
          if [ "${{ env.ENVIRONMENT }}" == "dev" ]; then
            TAG="dev"
          fi

          SUMMARY=$(cat << EOF
          ## Deployment Summary

          - **Environment:** ${{ env.ENVIRONMENT }}
          - **Image:** ghcr.io/${{ github.repository }}
          - **Docker Hub:** doezer/${{ env.REPO_NAME_LC }}
          - **Tags:** ${{ steps.meta.outputs.tags }}

          ### Pull and run the image:
          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:\$TAG
          docker run -d -p 5000:5000 \\
            -e POSTGRES_PASSWORD=your_password \\
            -e IGDB_CLIENT_ID=your_client_id \\
            -e IGDB_CLIENT_SECRET=your_client_secret \\
            ghcr.io/${{ github.repository }}:\$TAG
          \`\`\`
          EOF
          )

          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post result to PR
        if: always() && inputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.PAT }}
          repository: ${{ inputs.repository }}
          comment-id: ${{ inputs.comment-id }}
          body: ${{ steps.summary.outputs.content }}
