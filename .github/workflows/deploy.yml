name: Deploy Web App

on:
  # Allow manual trigger for on-demand deployment
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "test"
        type: choice
        options:
          - production
          - dev
          - test
      tag:
        description: "Docker image tag (leave empty for auto-generated tag)"
        required: false
        default: ""
      build_arm64:
        description: "Build ARM64 image (slows down build)"
        required: false
        default: false
        type: boolean
      comment-id: # ← passed automatically by slash-command-dispatch
        required: false
      repository: # ← also passed automatically
        required: false

  # Run daily at midnight from the default branch (main) for dev builds
  schedule:
    - cron: "0 0 * * *"

  # Trigger on release/1.4.1 branch for dev release
  push:
    branches:
      - "release/1.4.1"

permissions:
  contents: read

jobs:
  # Policy: docs/VULNERABILITY_MANAGEMENT.md §1.3 — no release may ship with
  # an unresolved Critical/High SCA finding. Runs again here (not just in
  # ci.yml) so a fresh advisory published after `main` was merged still
  # blocks the release.
  sca-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (Critical/High blocks release)
        run: npm audit --omit=dev --audit-level=high

      - name: Check dependency licenses
        run: |
          npx --yes license-checker@25.0.1 --production --summary \
            --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0;0BSD;Python-2.0;BlueOak-1.0.0;OFL-1.1;Unlicense;GPL-3.0;GPL-3.0-only;LGPL-2.1;LGPL-2.1-only;LGPL-3.0;LGPL-3.0-only;MPL-2.0"

  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'schedule' || github.ref == 'refs/heads/release/1.4.1') && 'dev' || inputs.environment || 'production' }}
    needs: sca-gate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Determine Environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" == "schedule" ] || [ "$GH_REF" == "refs/heads/release/1.4.1" ]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=${INPUT_ENVIRONMENT:-dev}" >> $GITHUB_ENV
            echo "environment=${INPUT_ENVIRONMENT:-dev}" >> $GITHUB_OUTPUT
          fi

          # Normalize repository name to lowercase and strip owner for Docker Hub
          REPO_NAME="$REPOSITORY"
          # Get the part after the slash (repo name only)
          REPO_SHOULD_BE_NAME="${REPO_NAME##*/}"
          # Lowercase
          REPO_NAME_LC=$(echo "$REPO_SHOULD_BE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "REPO_NAME_LC=$REPO_NAME_LC" >> $GITHUB_ENV

          # Full owner/repo, lowercased (GHCR requires lowercase image references)
          REPO_LC=$(echo "$REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LC=$REPO_LC" >> $GITHUB_ENV

      - name: Set up QEMU
        if: inputs.build_arm64 == true
        uses: step-security/setup-qemu-action@fe44c529aab16157fc475f4991a7f926aa9a02a2 # v4.1.0

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@6997872a55d77391e51b87609556578131f44402 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: step-security/docker-login-action@164e21d7e52229904128e2f946001cb88278c33d # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: step-security/docker-login-action@164e21d7e52229904128e2f946001cb88278c33d # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: |
            ghcr.io/${{ github.repository }}
            doezer/${{ env.REPO_NAME_LC }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest,enable=${{ env.ENVIRONMENT == 'production' }}
            type=raw,value=dev,enable=${{ env.ENVIRONMENT == 'dev' }}
            type=sha,prefix=${{ env.ENVIRONMENT }}-sha-,format=short,enable=${{ env.ENVIRONMENT != 'dev' }}
          labels: |
            org.opencontainers.image.title=Questarr
            org.opencontainers.image.description=Questarr is an *Arr-inspired game manager that helps you discover, track, and automatically download the games you want.
            org.opencontainers.image.vendor=Doezer

      - name: Build and push Docker image
        id: build
        uses: step-security/docker-build-push-action@9af9b5acc1751dcec2aa5375a068979fa526bc9a # v7.2.0
        with:
          context: .
          platforms: ${{ (env.ENVIRONMENT == 'production' && inputs.build_arm64 == true) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          sbom: true

      - name: Prune old GHCR package versions (keep 15 days)
        if: github.event_name == 'schedule' && env.ENVIRONMENT == 'dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ env.REPO_NAME_LC }}
        run: |
          set -euo pipefail

          cutoff_epoch=$(date -u -d '15 days ago' +%s)
          deleted_count=0

          if gh api "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=1" >/dev/null 2>&1; then
            package_api="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}"
          else
            package_api="/users/${OWNER}/packages/container/${PACKAGE_NAME}"
          fi

          while IFS=$'\t' read -r version_id created_at; do
            created_epoch=$(date -u -d "${created_at}" +%s)
            if [ "${created_epoch}" -lt "${cutoff_epoch}" ]; then
              echo "Deleting untagged version ${version_id} (${created_at})"
              gh api -X DELETE "${package_api}/versions/${version_id}"
              deleted_count=$((deleted_count + 1))
            fi
          done < <(
            gh api --paginate "${package_api}/versions?per_page=100" \
              --jq '.[] | select(((.metadata.container.tags // []) | length) == 0) | "\(.id)\t\(.created_at)"'
          )

          echo "Pruned ${deleted_count} old GHCR package version(s)."

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ env.REPO_LC }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-questarr-${{ env.VERSION }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-questarr-${{ env.VERSION }}-${{ env.ENVIRONMENT }}
          path: sbom-questarr-${{ env.VERSION }}.spdx.json
          retention-days: 90

      - name: Deployment summary
        id: summary
        run: |
          TAG="latest"
          if [ "${{ env.ENVIRONMENT }}" == "dev" ]; then
            TAG="dev"
          fi

          SUMMARY=$(cat << EOF
          ## Deployment Summary

          - **Environment:** ${{ env.ENVIRONMENT }}
          - **Image:** ghcr.io/${{ env.REPO_LC }}
          - **Docker Hub:** doezer/${{ env.REPO_NAME_LC }}
          - **Tags:** ${{ steps.meta.outputs.tags }}
          - **SBOM:** attached to the image as an attestation, and uploaded as the \`sbom-questarr-${{ env.VERSION }}-${{ env.ENVIRONMENT }}\` workflow artifact

          ### Pull and run the image:
          \`\`\`bash
          docker pull ghcr.io/${{ env.REPO_LC }}:\$TAG
          docker run -d -p 5000:5000 \\
            -e POSTGRES_PASSWORD=your_password \\
            -e IGDB_CLIENT_ID=your_client_id \\
            -e IGDB_CLIENT_SECRET=your_client_secret \\
            ghcr.io/${{ env.REPO_LC }}:\$TAG
          \`\`\`

          ### Inspect the SBOM attestation:
          \`\`\`bash
          docker buildx imagetools inspect ghcr.io/${{ env.REPO_LC }}:\$TAG --format '{{ json (index .SBOM "linux/amd64").SPDX }}'
          \`\`\`
          EOF
          )

          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post result to PR
        if: always() && inputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.PAT }}
          repository: ${{ inputs.repository }}
          comment-id: ${{ inputs.comment-id }}
          body: ${{ steps.summary.outputs.content }}
