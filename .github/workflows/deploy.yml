name: Deploy Web App

on:
  # Allow manual trigger for on-demand deployment
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "test"
        type: choice
        options:
          - production
          - dev
          - test
      tag:
        description: "Docker image tag (leave empty for auto-generated tag)"
        required: false
        default: ""
      build_arm64:
        description: "Build ARM64 image (slows down build)"
        required: false
        default: false
        type: boolean
      comment-id: # ← passed automatically by slash-command-dispatch
        required: false
      repository: # ← also passed automatically
        required: false

  # Run daily at midnight from the default branch (main) for dev builds
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  packages: write

jobs:
  # Policy: docs/VULNERABILITY_MANAGEMENT.md §1.3 — no release may ship with
  # an unresolved Critical/High SCA finding. Runs again here (not just in
  # ci.yml) so a fresh advisory published after `main` was merged still
  # blocks the release.
  sca-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (Critical/High blocks release)
        run: npm audit --omit=dev --audit-level=high

      - name: Check dependency licenses
        run: |
          npx --yes license-checker --production --summary \
            --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0;0BSD;Python-2.0;BlueOak-1.0.0;GPL-2.0;GPL-2.0-only;GPL-3.0;GPL-3.0-only;LGPL-2.1;LGPL-2.1-only;LGPL-3.0;LGPL-3.0-only;MPL-2.0"

  build-and-push:
    runs-on: ubuntu-latest
    needs: sca-gate
    environment: ${{ github.event_name == 'schedule' && 'dev' || inputs.environment || 'production' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Determine Environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" == "schedule" ]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=${INPUT_ENVIRONMENT:-dev}" >> $GITHUB_ENV
            echo "environment=${INPUT_ENVIRONMENT:-dev}" >> $GITHUB_OUTPUT
          fi

          # Normalize repository name to lowercase and strip owner for Docker Hub
          REPO_NAME="$REPOSITORY"
          # Get the part after the slash (repo name only)
          REPO_SHOULD_BE_NAME="${REPO_NAME##*/}"
          # Lowercase
          REPO_NAME_LC=$(echo "$REPO_SHOULD_BE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "REPO_NAME_LC=$REPO_NAME_LC" >> $GITHUB_ENV

          # Full owner/repo, lowercased (GHCR requires lowercase image references)
          REPO_LC=$(echo "$REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LC=$REPO_LC" >> $GITHUB_ENV

      - name: Set up QEMU
        if: inputs.build_arm64 == true
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            doezer/${{ env.REPO_NAME_LC }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest,enable=${{ env.ENVIRONMENT == 'production' }}
            type=raw,value=dev,enable=${{ env.ENVIRONMENT == 'dev' }}
            type=sha,prefix=${{ env.ENVIRONMENT }}-sha-,format=short,enable=${{ env.ENVIRONMENT != 'dev' }}
          labels: |
            org.opencontainers.image.title=Questarr
            org.opencontainers.image.description=A video game management application inspired by the -Arr apps. Track and organize your video game collection with automated discovery and download management.
            org.opencontainers.image.vendor=Doezer

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ (env.ENVIRONMENT == 'production' && inputs.build_arm64 == true) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          sbom: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ env.REPO_LC }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-questarr-${{ env.VERSION }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-questarr-${{ env.VERSION }}-${{ env.ENVIRONMENT }}
          path: sbom-questarr-${{ env.VERSION }}.spdx.json
          retention-days: 90

      - name: Deployment summary
        id: summary
        run: |
          TAG="latest"
          if [ "${{ env.ENVIRONMENT }}" == "dev" ]; then
            TAG="dev"
          fi

          SUMMARY=$(cat << EOF
          ## Deployment Summary

          - **Environment:** ${{ env.ENVIRONMENT }}
          - **Image:** ghcr.io/${{ env.REPO_LC }}
          - **Docker Hub:** doezer/${{ env.REPO_NAME_LC }}
          - **Tags:** ${{ steps.meta.outputs.tags }}
          - **SBOM:** attached to the image as an attestation, and uploaded as the \`sbom-questarr-${{ env.VERSION }}-${{ env.ENVIRONMENT }}\` workflow artifact

          ### Pull and run the image:
          \`\`\`bash
          docker pull ghcr.io/${{ env.REPO_LC }}:\$TAG
          docker run -d -p 5000:5000 \\
            -e POSTGRES_PASSWORD=your_password \\
            -e IGDB_CLIENT_ID=your_client_id \\
            -e IGDB_CLIENT_SECRET=your_client_secret \\
            ghcr.io/${{ env.REPO_LC }}:\$TAG
          \`\`\`

          ### Inspect the SBOM attestation:
          \`\`\`bash
          docker buildx imagetools inspect ghcr.io/${{ env.REPO_LC }}:\$TAG --format '{{ json (index .SBOM "linux/amd64").SPDX }}'
          \`\`\`
          EOF
          )

          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post result to PR
        if: always() && inputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.PAT }}
          repository: ${{ inputs.repository }}
          comment-id: ${{ inputs.comment-id }}
          body: ${{ steps.summary.outputs.content }}
