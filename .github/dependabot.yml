version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    versioning-strategy: increase
    groups:
      # Group React related dependencies
      react:
        patterns:
          - "react*"
          - "@types/react*"
      # Group Radix UI components
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Group development tools
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Group all other production dependencies
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - "github-actions"
      - "dependencies"
    groups:
      # Group all GitHub Actions updates into a single PR
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    target-branch: "main"
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /questarr
    target-branch: "main"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
