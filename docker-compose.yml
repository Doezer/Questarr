services:
  app:
    image: ghcr.io/doezer/questarr:latest
    ports:
      - "${PORT:-5000}:5000"
      - "${SSL_PORT:-9898}:${SSL_PORT:-9898}"
    # environment:
    #   - SQLITE_DB_PATH=/app/data/sqlite.db  # Default path for sqlite db, uncomment and change if needed
    volumes:
      # Persist SQLite database and other data
      - ./data:/app/data
      # Mount your root media/downloads folder here to allow atomic moves.
      # Example (uncomment and adjust):
      # - /mnt/user/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
