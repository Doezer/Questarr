name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main, release/*]
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0

      # secretlint requires Node >=22
      - name: Setup Node.js 26.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.x
          cache: "npm"

      # secretlint only lints files; it needs no native modules built, so lifecycle
      # scripts (arbitrary code from transitive deps) are skipped here.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Scan for secrets
        run: npm run secretlint

  check-overrides:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0

      - name: Setup Node.js 26.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.x
          cache: "npm"

      # check-overrides only reads package.json manifests already unpacked into
      # node_modules; no native modules need building, so scripts are skipped.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Fails if a package.json "overrides" entry (see docs/DEPENDENCIES.md) has become
      # redundant, i.e. every consumer now declares a range that's already safe on its own.
      - name: Check for stale dependency overrides
        run: npm run check:overrides

  sca-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0

      - name: Setup Node.js 26.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Policy: docs/VULNERABILITY_MANAGEMENT.md §1.3 — Critical/High findings
      # in production dependencies block merge/release.
      - name: Audit production dependencies (Critical/High blocks build)
        run: npm audit --omit=dev --audit-level=high

      # Policy: docs/VULNERABILITY_MANAGEMENT.md §1.4 — production dependency
      # licenses must be on the allow-list.
      - name: Check dependency licenses
        run: |
          npx --yes license-checker@25.0.1 --production --summary \
            --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0;0BSD;Python-2.0;BlueOak-1.0.0;OFL-1.1;Unlicense;GPL-3.0;GPL-3.0-only;LGPL-2.1;LGPL-2.1-only;LGPL-3.0;LGPL-3.0-only;MPL-2.0"

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [26.x]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npm run check

      - name: Tests
        run: npm test -- --coverage --reporter=junit --outputFile=test-report.junit.xml

      - name: Build project
        run: npm run build

      - name: Check for build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found after build"
            exit 1
          fi
          echo "Build successful - dist directory created"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          report_type: coverage
          skip_validation: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          skip_validation: true

  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0

      - name: Pre-pull BuildKit image
        run: |
          for i in {1..5}; do
            docker pull moby/buildkit:buildx-stable-1 && break
            echo "Pull failed, retrying in 5 seconds..."
            sleep 5
          done

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@6997872a55d77391e51b87609556578131f44402 # v4.1.0
      - name: Build Docker image
        uses: step-security/docker-build-push-action@9af9b5acc1751dcec2aa5375a068979fa526bc9a # v7.2.0
        with:
          context: .
          push: false
          tags: questarr:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify Docker image
        run: |
          echo "Docker image built successfully"
          docker images | grep questarr || echo "Image not found in docker images, but build completed"
