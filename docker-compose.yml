services:
  app:
    image: ghcr.io/doezer/questarr:latest
    ports:
      - "${PORT:-5000}:5000"
      - "${SSL_PORT:-9898}:${SSL_PORT:-9898}"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SQLITE_DB_PATH=/app/data/sqlite.db
      - SSL_PORT=${SSL_PORT:-9898}
    volumes:
      # Persist SQLite database and other data
      - ./data:/app/data
      # Questarr must be able to see downloader output paths and RomM library paths.
      # If downloader reports /downloads inside its container, mount that same host path here.
      # Example:
      # - /srv/downloads:/downloads
      # RomM library root used by integration imports.
      # Example:
      # - /srv/romm/library/roms:/romm/library/roms
      # Optional shared root when you want a single mount for both source and destination.
      # - /srv/media:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
